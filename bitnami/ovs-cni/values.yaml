## @section ovs-cni parameters
##

## ovs-cni image version
## ref: https://github.com/k8snetworkplumbingwg/ovs-cni/pkgs/container/ovs-cni-plugin
## The same image bundles four binaries: `ovs` (main CNI), `ovs-mirror-producer`, `ovs-mirror-consumer` and `marker`.
## @param image.registry [default: REGISTRY_NAME] ovs-cni image registry
## @param image.repository [default: REPOSITORY_NAME/ovs-cni-plugin] ovs-cni Image name
## @skip image.tag ovs-cni Image tag
## @param image.digest ovs-cni image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
## @param image.pullPolicy ovs-cni image pull policy
## @param image.pullSecrets Specify docker-registry secret names as an array
## @param image.debug Specify if debug logs should be enabled
##
image:
  registry: ghcr.io
  repository: k8snetworkplumbingwg/ovs-cni-plugin
  tag: latest
  digest: ""
  ## Specify a imagePullPolicy
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  pullSecrets: []
  ## Set to true if you would like to see extra information on logs
  ##
  debug: false
## @param hostCNIBinDir CNI binary dir in the host machine
## Note: Both containerd and CRI-O use /opt/cni/bin as the default CNI plugin directory
##
hostCNIBinDir: /opt/cni/bin
## @param CNIMountPath Path inside the container to mount the host CNI bin dir under
## The init container copies binaries to `${CNIMountPath}${hostCNIBinDir}`.
##
CNIMountPath: /host
## CNI binaries shipped by the ovs-cni-plugin image. Toggle entries off if you do not need
## traffic mirroring CNI plugins (saves ~15MB per node host filesystem footprint).
## @param plugins.ovs Install the main `ovs` CNI binary used to attach Pods to OVS bridges
## @param plugins.mirrorProducer Install the `ovs-mirror-producer` CNI binary (mirror traffic out of an interface)
## @param plugins.mirrorConsumer Install the `ovs-mirror-consumer` CNI binary (mirror traffic into an interface)
##
plugins:
  ovs: true
  mirrorProducer: true
  mirrorConsumer: true
## Marker daemon configuration. The marker watches OVS via the OVSDB socket and publishes
## each bridge as `ovs-cni.network.kubevirt.io/<bridge>` under `node.status.capacity`,
## so the K8s scheduler can place Pods on nodes that actually have the required bridge.
##
marker:
  ## @param marker.enabled Run the marker daemon as the main container. Set to false to only deploy the CNI binaries (rare; you lose bridge scheduling resources).
  ##
  enabled: true
  ## @param marker.updateInterval Interval, in seconds, between Node status patches. Default upstream is 60.
  ##
  updateInterval: 60
  ## @param marker.reconcileInterval Interval, in minutes, between full reconciliations between cached and reported bridges. Default upstream is 10.
  ##
  reconcileInterval: 10
  ## @param marker.healthCheckInterval Interval, in seconds, for the liveness/readiness `find /tmp/healthy -mmin -2` probe and the internal keep-alive touch loop.
  ##
  healthCheckInterval: 60
  ## @param marker.verbosity glog -v level for the marker (`-v` flag). 0 = quiet, 3 = upstream default, 5 = very verbose.
  ##
  verbosity: 3
## OVS database socket location. The marker connects here to enumerate bridges,
## and the path is also bind-mounted into the container.
##
ovsSocket:
  ## @param ovsSocket.type OVSDB socket type. Allowed values: `unix`, `tcp`. With `unix` the chart bind-mounts `hostPath` into the marker.
  ##
  type: unix
  ## @param ovsSocket.path Path to the OVSDB unix socket on the host (used when `ovsSocket.type=unix`). Mounted into the marker container.
  ##
  path: /var/run/openvswitch/db.sock
  ## @param ovsSocket.host Hostname/IP for the OVSDB TCP endpoint (used when `ovsSocket.type=tcp`).
  ##
  host: ""
  ## @param ovsSocket.port TCP port for the OVSDB endpoint (used when `ovsSocket.type=tcp`).
  ##
  port: 6640
## @param command Override default marker container command (useful when using custom images)
##
command: []
## @param args Override default marker container args (useful when using custom images)
##
args: []
## @param updateStrategy.type ovs-cni DaemonSet update strategy
##
updateStrategy:
  type: RollingUpdate
## @param priorityClassName ovs-cni pods' priorityClassName
##
priorityClassName: "system-node-critical"
## @param schedulerName Name of the k8s scheduler (other than default)
## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
##
schedulerName: ""
## @param topologySpreadConstraints Topology Spread Constraints for pod assignment
## https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
## The value is evaluated as a template
##
topologySpreadConstraints: []
## @param automountServiceAccountToken Mount Service Account token in pod
##
automountServiceAccountToken: true
## @param hostAliases [array] Add deployment host aliases
## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
##
hostAliases: []
## @param extraEnvVars Extra environment variables to add to the marker container
##
extraEnvVars: []
## @param extraEnvVarsCM ConfigMap containing extra env vars
##
extraEnvVarsCM: ""
## @param extraEnvVarsSecret Secret containing extra env vars (in case of sensitive data)
##
extraEnvVarsSecret: ""
## @param extraVolumes Array of extra volumes to be added to the deployment (evaluated as template). Requires setting `extraVolumeMounts`
##
extraVolumes: []
## @param extraVolumeMounts Array of extra volume mounts to be added to the container (evaluated as template). Normally used with `extraVolumes`.
##
extraVolumeMounts: []
## @param initContainers Add additional init containers to the pod (evaluated as a template)
##
initContainers: []
## @param sidecars Attach additional containers to the pod (evaluated as a template)
##
sidecars: []
## @param tolerations Tolerations for pod assignment
## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
## Default tolerates control-plane taints so the DaemonSet covers every node.
##
tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute
## Network Policies
## Ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
##
networkPolicy:
  ## @param networkPolicy.enabled Specifies whether a NetworkPolicy should be created
  ##
  enabled: true
  ## @param networkPolicy.kubeAPIServerPorts [array] List of possible endpoints to kube-apiserver (limit to your cluster settings to increase security)
  ##
  kubeAPIServerPorts: [443, 6443, 8443]
  ## @param networkPolicy.allowExternal Don't require server label for connections
  ## The Policy model to apply. When set to false, only pods with the correct
  ## server label will have network access to the ports server is listening
  ## on. When true, server will accept connections from any source
  ## (with the correct destination port).
  ##
  allowExternal: true
  ## @param networkPolicy.allowExternalEgress Allow the pod to access any range of port and all destinations.
  ##
  allowExternalEgress: true
  ## @param networkPolicy.extraIngress [array] Add extra ingress rules to the NetworkPolicy
  ##
  extraIngress: []
  ## @param networkPolicy.extraEgress [array] Add extra egress rules to the NetworkPolicy
  ##
  extraEgress: []
  ## @param networkPolicy.ingressNSMatchLabels [object] Labels to match to allow traffic from other namespaces
  ## @param networkPolicy.ingressNSPodMatchLabels [object] Pod labels to match to allow traffic from other namespaces
  ##
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}
## @param podAffinityPreset Pod affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
##
podAffinityPreset: ""
## @param podAntiAffinityPreset Pod anti-affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
##
podAntiAffinityPreset: soft
## Node affinity preset
## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
## @param nodeAffinityPreset.type Node affinity preset type. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
## @param nodeAffinityPreset.key Node label key to match Ignored if `affinity` is set.
## @param nodeAffinityPreset.values Node label values to match. Ignored if `affinity` is set.
##
nodeAffinityPreset:
  type: ""
  ## E.g.
  ## key: "kubernetes.io/e2e-az-name"
  ##
  key: ""
  ## E.g.
  ## values:
  ##   - e2e-az1
  ##   - e2e-az2
  ##
  values: []
## @param affinity Affinity for pod assignment
## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
## Note: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
##
affinity: {}
## @param nodeSelector Node labels for pod assignment. Evaluated as a template.
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
## Defaults to Linux only; Open vSwitch requires the host kernel module which is Linux-specific.
##
nodeSelector:
  kubernetes.io/os: linux
## ovs-cni container's resource requests and limits
## ref: http://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
## @param resourcesPreset Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge). This is ignored if resources is set (resources is recommended for production).
## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
##
resourcesPreset: "nano"
## @param resources Set container requests and limits for different resources like CPU or memory (essential for production workloads)
## Example:
## resources:
##   requests:
##     cpu: 10m
##     memory: 10Mi
##   limits:
##     cpu: 100m
##     memory: 50Mi
##
resources: {}
## Configure Pods Security Context
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
## @param podSecurityContext.enabled Enable ovs-cni pods' Security Context
## @param podSecurityContext.fsGroupChangePolicy Set filesystem group change policy
## @param podSecurityContext.sysctls Set kernel settings using the sysctl interface
## @param podSecurityContext.supplementalGroups Set filesystem extra groups
## @param podSecurityContext.fsGroup ovs-cni pods' group ID
##
podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 0
## Configure Container Security Context (only main container)
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
## ovs-cni needs privileged: true because it manipulates host network namespaces
## (creates/destroys veth pairs and adds them to OVS bridges via `ovs-vsctl`).
## @param containerSecurityContext.enabled Enable ovs-cni containers' Security Context
## @param containerSecurityContext.seLinuxOptions [object,nullable] Set SELinux options in container
## @param containerSecurityContext.runAsUser ovs-cni containers' Security Context
## @param containerSecurityContext.runAsGroup ovs-cni containers' Security Context
## @param containerSecurityContext.runAsNonRoot Set ovs-cni container's Security Context runAsNonRoot
## @param containerSecurityContext.privileged Set ovs-cni container's Security Context privileged
## @param containerSecurityContext.allowPrivilegeEscalation Set container's Security Context allowPrivilegeEscalation
## @param containerSecurityContext.readOnlyRootFilesystem Set container's Security Context readOnlyRootFilesystem
## @param containerSecurityContext.capabilities.drop List of capabilities to be dropped
## @param containerSecurityContext.seccompProfile.type Set container's Security Context seccomp profile
##
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  privileged: true
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
## Configure extra options for startup probe
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
## @param startupProbe.enabled Enable startupProbe
## @param startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
## @param startupProbe.periodSeconds Period seconds for startupProbe
## @param startupProbe.timeoutSeconds Timeout seconds for startupProbe
## @param startupProbe.failureThreshold Failure threshold for startupProbe
## @param startupProbe.successThreshold Success threshold for startupProbe
##
startupProbe:
  enabled: false
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1
## Configure extra options for liveness probe
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
## @param livenessProbe.enabled Enable livenessProbe (uses upstream `find /tmp/healthy -mmin -2` check)
## @param livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
## @param livenessProbe.periodSeconds Period seconds for livenessProbe
## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
## @param livenessProbe.failureThreshold Failure threshold for livenessProbe
## @param livenessProbe.successThreshold Success threshold for livenessProbe
##
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1
## Configure extra options for readiness probe
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
## @param readinessProbe.enabled Enable readinessProbe
## @param readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
## @param readinessProbe.periodSeconds Period seconds for readinessProbe
## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
## @param readinessProbe.failureThreshold Failure threshold for readinessProbe
## @param readinessProbe.successThreshold Success threshold for readinessProbe
##
readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1
## @param customStartupProbe Override default startup probe
##
customStartupProbe: {}
## @param customLivenessProbe Override default liveness probe
##
customLivenessProbe: {}
## @param customReadinessProbe Override default readiness probe
##
customReadinessProbe: {}
## @param lifecycleHooks LifecycleHook to set additional configuration at startup Evaluated as a template
##
lifecycleHooks: {}
## @param podAnnotations Pod annotations
## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
##
podAnnotations: {}
## @param podLabels Add additional labels to the pod (evaluated as a template)
## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
##
podLabels: {}
## @section Other Parameters
##

## RBAC configuration
##
rbac:
  ## @param rbac.create Specifies whether RBAC resources (ClusterRole + ClusterRoleBinding for the marker) should be created
  ##
  create: true
## Service account for ovs-cni to use.
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
##
serviceAccount:
  ## @param serviceAccount.create Enable creation of ServiceAccount for ovs-cni pod
  ##
  create: true
  ## @param serviceAccount.name The name of the ServiceAccount to use.
  ## If not set and create is true, a name is generated using the common.names.fullname template
  ##
  name: ""
  ## @param serviceAccount.automountServiceAccountToken Allows auto mount of ServiceAccountToken on the serviceAccount created
  ## The marker needs to call the K8s API (PATCH Node status), so this defaults to true.
  ##
  automountServiceAccountToken: true
  ## @param serviceAccount.annotations Additional custom annotations for the ServiceAccount
  ##
  annotations: {}
